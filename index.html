<html lang="en">
<head>
  <meta charset="UTF-8"/>

    :root {
      --bg:      #03060f;
      --card:    #080f1e;
      --border:  #0f1f3d;
      --accent:  #3b82f6;
      --cyan:    #06b6d4;
      --green:   #10b981;
      --text:    #e2eeff;
      --muted:   #4a6080;
      --userbg:  #0f2347;
      --botbg:   #080f1e;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { height: 100%; font-family: 'Outfit', sans-serif; background: var(--bg); color: var(--text); overflow: hidden; }

       WELCOME PAGE
    ══════════════════════════════ */

      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: var(--bg); overflow: hidden;
    }

    .orb {
      position: absolute; border-radius: 50%;
      filter: blur(80px); opacity: 0.12; pointer-events: none;
    }
    .o1 { width: 500px; height: 500px; background: #1d4ed8; top: -150px; left: -150px; animation: fo 8s ease-in-out infinite; }
    .o2 { width: 400px; height: 400px; background: #0891b2; bottom: -100px; right: -100px; animation: fo 10s ease-in-out infinite reverse; }
    .o3 { width: 300px; height: 300px; background: #7c3aed; top: 50%; left: 50%; transform: translate(-50%,-50%); animation: fo 7s ease-in-out infinite 1s; }

    @keyframes fo {
      0%,100% { transform: translate(0,0); }
      50% { transform: translate(15px,-15px); }
    }

    #welcome::before {
      content: '';
      position: absolute; inset: 0;
      background-image: linear-gradient(rgba(59,130,246,0.04) 1px, transparent 1px), linear-gradient(90deg, rgba(59,130,246,0.04) 1px, transparent 1px);
      background-size: 50px 50px; pointer-events: none;
    }

    .wc {
      position: relative; z-index: 2;
      display: flex; flex-direction: column; align-items: center; text-align: center;
      padding: 24px;
      animation: fadeUp 0.7s ease forwards;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(28px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .wlogo {
      width: 82px; height: 82px; border-radius: 22px;
      background: linear-gradient(135deg, #1e40af, #0e7490);
      display: flex; align-items: center; justify-content: center;
      font-size: 42px; margin-bottom: 26px;
      box-shadow: 0 0 50px rgba(59,130,246,0.35), 0 0 0 1px rgba(59,130,246,0.15);
      animation: glow 3s ease-in-out infinite;
    }

    @keyframes glow {
      0%,100% { box-shadow: 0 0 40px rgba(59,130,246,0.35), 0 0 0 1px rgba(59,130,246,0.15); }
      50%      { box-shadow: 0 0 70px rgba(59,130,246,0.55), 0 0 0 1px rgba(59,130,246,0.3); }
    }

    .wtag {
      font-size: 11px; font-family: 'JetBrains Mono', monospace;
      color: var(--cyan); letter-spacing: 3px; text-transform: uppercase;
      background: rgba(6,182,212,0.07); border: 1px solid rgba(6,182,212,0.2);
      padding: 5px 16px; border-radius: 20px; margin-bottom: 20px;
    }

    .wtitle {
      font-size: clamp(40px, 11vw, 68px);
      font-weight: 700; line-height: 1.1; margin-bottom: 14px; letter-spacing: -1.5px;
    }

    .wtitle .g {
      background: linear-gradient(135deg, #60a5fa, #06b6d4, #a78bfa);
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text; background-size: 200%;
      animation: gs 4s ease infinite;
    }

    @keyframes gs {
      0%,100% { background-position: 0% 50%; }
      50%      { background-position: 100% 50%; }
    }

    .wsub {
      font-size: 14px; color: var(--muted); max-width: 340px;
      line-height: 1.6; margin-bottom: 36px;
      font-family: 'JetBrains Mono', monospace;
    }

    .wpills {
      display: flex; flex-wrap: wrap; gap: 8px;
      justify-content: center; margin-bottom: 44px;
    }

    .wp {
      font-size: 11px; font-family: 'JetBrains Mono', monospace;
      padding: 5px 13px; border-radius: 20px;
      border: 1px solid var(--border);
      color: var(--muted); background: rgba(255,255,255,0.02);
      display: flex; align-items: center; gap: 6px;
    }
    .wp .dot { width: 6px; height: 6px; border-radius: 50%; }

    .startbtn {
      padding: 15px 46px; font-size: 16px; font-weight: 600;
      font-family: 'Outfit', sans-serif; color: #fff;
      border: none; border-radius: 14px; cursor: pointer;
      background: linear-gradient(135deg, #1d4ed8, #0891b2);
      box-shadow: 0 8px 30px rgba(29,78,216,0.4);
      transition: transform 0.2s, box-shadow 0.2s;
      position: relative; overflow: hidden;
    }
    .startbtn::after {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.12), transparent);
      opacity: 0; transition: opacity 0.2s;
    }
    .startbtn:hover { transform: translateY(-2px); box-shadow: 0 14px 40px rgba(29,78,216,0.5); }
    .startbtn:hover::after { opacity: 1; }
    .startbtn:active { transform: translateY(0); }
    .startbtn .arr { margin-left: 8px; display: inline-block; transition: transform 0.2s; }
    .startbtn:hover .arr { transform: translateX(4px); }

    /* ══════════════════════════════
       CHAT PAGE
    ══════════════════════════════ */
    #chat {
      display: none; flex-direction: column;
      height: 100vh; position: fixed; inset: 0;
    }
    #chat.on { display: flex; animation: pageIn 0.35s cubic-bezier(.22,.68,0,1.2); }

    @keyframes pageIn {
      from { opacity: 0; transform: scale(0.97) translateY(16px); }
      to   { opacity: 1; transform: none; }
    }

    #chat::before {
      content: ''; position: fixed; inset: 0;
      background-image: linear-gradient(rgba(59,130,246,0.025) 1px, transparent 1px), linear-gradient(90deg, rgba(59,130,246,0.025) 1px, transparent 1px);
      background-size: 40px 40px; pointer-events: none; z-index: 0;
    }

    /* topbar */
    .topbar {
      position: relative; z-index: 10;

      background: rgba(8,15,30,0.97);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(16px); flex-shrink: 0;

    .tl { display: flex; align-items: center; gap: 11px; }

    .ticon {

    }
    .backbtn:hover { color: var(--text); border-color: var(--muted); }

    /* messages */
    .msgs {
      flex: 1; overflow-y: auto; padding: 18px 15px;
      display: flex; flex-direction: column; gap: 13px;
      position: relative; z-index: 1;

    .msgs::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

// ══════════════════════════════════════════
// TF-IDF ENGINE (JavaScript implementation)
// ══════════════════════════════════════════

function tokenize(text) {
  const stopwords = new Set(["a","an","the","is","it","in","on","at","to","for","of","and","or","but","are","was","were","be","been","has","have","had","do","does","did","will","would","could","should","may","might","this","that","these","those","i","you","we","they","he","she","what","how","why","when","where","which","who"]);
  return text.toLowerCase()
    .replace(/[^a-z0-9\s]/g, "")
    .split(/\s+/)
    .filter(w => w.length > 1 && !stopwords.has(w));
}

function buildTFIDF(docs) {
  const tokenized = docs.map(d => tokenize(d));
  const N = tokenized.length;

  // document frequency
  const df = {};
  tokenized.forEach(tokens => {
    new Set(tokens).forEach(t => { df[t] = (df[t] || 0) + 1; });
  });

  // TF-IDF vectors
  return tokenized.map(tokens => {
    const tf = {};
    tokens.forEach(t => { tf[t] = (tf[t] || 0) + 1; });
    const vec = {};
    Object.keys(tf).forEach(t => {
      vec[t] = (tf[t] / tokens.length) * Math.log((N + 1) / ((df[t] || 0) + 1));
    });
    return vec;
  });
}

function cosineSim(a, b) {
  let dot = 0, normA = 0, normB = 0;
  Object.keys(a).forEach(k => { if (b[k]) dot += a[k] * b[k]; normA += a[k] * a[k]; });
  Object.keys(b).forEach(k => { normB += b[k] * b[k]; });
  const denom = Math.sqrt(normA) * Math.sqrt(normB);
  return denom === 0 ? 0 : dot / denom;
}

// Build model on load
const questions = dataset.map(d => d[0]);
const answers   = dataset.map(d => d[1]);
const vectors   = buildTFIDF(questions);

function getResponse(input) {
  const qVec = {};
  const tokens = tokenize(input);
  if (tokens.length === 0) return { answer: "Please type something!", score: 0 };
  tokens.forEach(t => { qVec[t] = (qVec[t] || 0) + 1; });

  let best = -1, bestIdx = 0;
  vectors.forEach((v, i) => {
    const s = cosineSim(qVec, v);
    if (s > best) { best = s; bestIdx = i; }
  });

  if (best < 0.08) return { answer: "Not sure about that. Try asking about IT, programming, ML, or college topics!", score: 0 };
  return { answer: answers[bestIdx], score: Math.round(best * 100) };
}

// UI LOGIC
// ══════════════════════════════════════════

const msgsEl = document.getElementById("msgs");
const inpEl  = document.getElementById("inp");
const sBtn   = document.getElementById("sbtn");

function startChat() {
  const wp = document.getElementById("welcome");
  wp.style.transition = "all 0.35s ease";
  wp.style.opacity = "0";
  wp.style.transform = "scale(1.04)";
  setTimeout(() => {
    wp.style.display = "none";
    const cp = document.getElementById("chat");
    cp.classList.add("on");
    addMsg("Hey! I'm NexBot 👋 Ask me anything about IT, programming, machine learning, or college topics!", "b");
    inpEl.focus();
  }, 340);
}

function goBack() {
  const cp = document.getElementById("chat");
  const wp = document.getElementById("welcome");
  cp.classList.remove("on");
  cp.style.display = "none";
  wp.style.display = "flex";
  wp.style.opacity = "1";
  wp.style.transform = "scale(1)";
  wp.style.transition = "none";
}

function now() {
  return new Date().toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
}

function addMsg(text, who, score) {
  const d = document.createElement("div");
  d.className = `msg ${who}`;
  const icon = who === "b" ? "🤖" : "👤";
  const name = who === "b" ? "NexBot" : "You";
  const scoreHtml = (who === "b" && score > 0) ? `<span style="margin-left:4px;padding:1px 7px;border-radius:10px;font-size:10px;background:rgba(16,185,129,0.1);color:#10b981">${score}%</span>` : "";
  d.innerHTML = `
    <div class="av">${icon}</div>
    <div class="mbody">
      <div class="bubble">${text}</div>
      <div class="meta">${name} · ${now()}${scoreHtml}</div>
    </div>`;
  msgsEl.appendChild(d);
  msgsEl.scrollTop = msgsEl.scrollHeight;
}

function showTyping() {
  const d = document.createElement("div");
  d.className = "msg b"; d.id = "typing";
  d.innerHTML = `<div class="av">🤖</div><div class="mbody"><div class="bubble"><div class="tdots"><span></span><span></span><span></span></div></div></div>`;
  msgsEl.appendChild(d);
  msgsEl.scrollTop = msgsEl.scrollHeight;
}

function removeTyping() {
  const el = document.getElementById("typing");
  if (el) el.remove();
}

function send(text) {
  const msg = (text || inpEl.value).trim();
  if (!msg) return;
  addMsg(msg, "u");
  inpEl.value = ""; sBtn.disabled = true;
  document.getElementById("sugs").style.display = "none";
  showTyping();
  setTimeout(() => {
    removeTyping();
    const result = getResponse(msg);
    addMsg(result.answer, "b", result.score);
    sBtn.disabled = false;
    inpEl.focus();
  }, 600);
}

function ask(q) { send(q); }
inpEl.addEventListener("keydown", e => { if (e.key === "Enter") send(); });
